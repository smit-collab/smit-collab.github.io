<script>
  (function () {
    /* Default is light; only apply dark if explicitly saved */
    if (localStorage.getItem("portfolio-theme") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    } else {
      document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("portfolio-theme", "light");
    }
  })();
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    /* Theme toggle — top right corner */
    var root = document.documentElement;
    var toggle = document.createElement("button");
    toggle.className = "theme-toggle";
    toggle.type = "button";
    toggle.setAttribute("aria-label", "Toggle dark mode");

    function updateToggleLabel() {
      var isDark = root.getAttribute("data-theme") === "dark";
      toggle.innerHTML =
        '<span class="theme-toggle-icon">' + (isDark ? "☀️" : "🌙") + "</span>" +
        "<span>" + (isDark ? "Light" : "Dark") + "</span>";
    }

    updateToggleLabel();

    toggle.addEventListener("click", function () {
      var isDark = root.getAttribute("data-theme") === "dark";
      if (isDark) {
        root.removeAttribute("data-theme");
        localStorage.setItem("portfolio-theme", "light");
      } else {
        root.setAttribute("data-theme", "dark");
        localStorage.setItem("portfolio-theme", "dark");
      }
      updateToggleLabel();
    });

    document.body.appendChild(toggle);

    /* Featured carousel */
    var track = document.getElementById("featured-track");
    if (!track) return;

    var prev = document.getElementById("featured-prev");
    var next = document.getElementById("featured-next");
    var scrollAmount = 360;

    function isMobile() {
      return window.matchMedia("(max-width: 960px)").matches;
    }

    if (prev) {
      prev.addEventListener("click", function () {
        if (isMobile()) return;
        track.scrollBy({ left: -scrollAmount, behavior: "smooth" });
      });
    }

    if (next) {
      next.addEventListener("click", function () {
        if (isMobile()) return;
        track.scrollBy({ left: scrollAmount, behavior: "smooth" });
      });
    }
  });
</script>
